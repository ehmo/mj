name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to be run on:"; echo "$unformatted"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        # Live tests are gated behind MJ_LIVE and skipped here; this runs the
        # offline parsers/param/transport unit tests only.
        run: go test ./...
      - name: build
        run: |
          go build ./cmd/mj
          go build ./cmd/mj-mcp
